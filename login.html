<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbelSocial | Log-in</title>
    <link rel="stylesheet" href="./estilos/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Federant&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="log-in">
        <h4>Log-In</h4>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <label id="pass-label" for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <p id="descripcion-login">Al iniciar sesión o crear una cuenta, aceptas nuestros <strong>Términos de Servicio</strong> y confirmas que has leído nuestra <strong>Política de Privacidad</strong>.</p>
        <a href="./second.html">
            <button id="boton-login" type="submit">Sign In</button>
        </a>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '1';
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = this.href;
                }, 500);
            });
        });
    </script>
</body>
</html>
